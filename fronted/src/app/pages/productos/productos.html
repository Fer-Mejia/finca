<div class="container mb-5 mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="input-group shadow-sm">
        <span class="input-group-text bg-white border-end-0">
          <i class="bi bi-search text-muted"></i>
        </span>
        <input 
          type="text" 
          class="form-control border-start-0 ps-0" 
          placeholder="Busca tu café favorito..."
          [value]="textoFiltro()"
          (input)="actualizarFiltro($event)">
      </div>
      <div class="text-center mt-2" *ngIf="textoFiltro()">
        <small class="text-muted">Mostrando resultados para: <strong>{{ textoFiltro() }}</strong></small>
      </div>
    </div>
  </div>
</div>

<div class="container mb-5">
  <div class="row g-4">
    @for (prod of productosFiltrados(); track prod.id_producto) {
      <div class="col-lg-4 col-md-6">
        <div class="product-card shadow-sm h-100 border-0">
          
          <div class="product-img-container position-relative overflow-hidden">
            <img [src]="prod.imagen" class="product-img w-100" [alt]="prod.nombre" 
                 style="height: 250px; object-fit: cover;">
            <div class="product-overlay"></div>
          </div>

          <div class="product-info p-4">
            <div class="d-flex justify-content-between align-items-start mb-2">
              <h4 class="fw-bold mb-0 text-dark">{{ prod.nombre }}</h4>
              <span class="badge bg-success fs-6">{{ prod.precio | currency }}</span>
            </div>
            
            <p class="text-muted small mb-3 text-truncate-2" style="height: 40px; overflow: hidden;">
              {{ prod.descripcion }}
            </p>

            <div class="mb-4">
              <span class="small fw-bold px-2 py-1 rounded bg-light border">
                {{ prod.stock | stockStatus }}
              </span>
            </div>
            
            <button 
              class="btn btn-dark w-100 fw-bold py-2 shadow-sm" 
              (click)="agregarAlCarrito(prod)"
              [disabled]="prod.stock <= 0"
              style="background-color: #3D2B1F; border: none;">
              {{ prod.stock > 0 ? 'Agregar al Carrito' : 'Agotado' }}
            </button>
          </div>
          
        </div>
      </div>
    } @empty {
      <div class="col-12 text-center py-5">
        <i class="bi bi-emoji-frown display-1 text-muted"></i>
        <h3 class="mt-3 text-muted">No encontramos ese café en La Finca</h3>
        <button class="btn btn-outline-secondary mt-2" (click)="textoFiltro.set('')">
          Ver todos los productos
        </button>
      </div>
    }
  </div>
</div>
