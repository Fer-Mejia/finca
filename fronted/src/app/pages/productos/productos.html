<div class="container mb-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="input-group shadow-sm">
        <span class="input-group-text bg-white border-end-0">
          <i class="bi bi-search text-muted"></i>
        </span>
        <input 
          type="text" 
          class="form-control border-start-0 ps-0" 
          placeholder="Busca tu café favorito"
          (input)="actualizarFiltro($event)">
      </div>
    </div>
  </div>
</div>

<div class="row g-4">
  @for (prod of productosFiltrados(); track prod.nombre) {
    <div class="col-lg-4 col-md-6">
      <div class="product-card shadow-sm">
        <div class="product-img-container">
          <img [src]="prod.imagen" class="product-img" [alt]="prod.nombre">
          <div class="product-overlay"></div>
        </div>
        <div class="product-info">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <h4 class="fw-bold mb-0">{{ prod.nombre }}</h4>
            <span class="price-tag">{{ prod.precio | currency }}</span>
          </div>
          <p class="text-muted small mb-4">{{ prod.descripcion }}</p>
          
          <button class="btn btn-add w-100 fw-bold" (click)="agregarAlCarrito(prod)">
            Agregar al Carrito
          </button>
        </div>
      </div>
    </div>
  } @empty {
    <div class="col-12 text-center p-5">
      <p class="text-muted">No encontramos ningún café con ese nombre.</p>
    </div>
  }
</div>
