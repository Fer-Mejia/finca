<div class="login-wrapper">
  <div class="background-image-overlay"></div>
  <div class="login-container d-flex align-items-center justify-content-center p-3">
    <div class="card login-card shadow-lg border-0">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <h2 class="fw-bold" style="color: #3D2B1F; font-family: 'Playfair Display';">Únete a La Finca</h2>
        </div>

        <form #registroForm="ngForm">
          <div class="form-floating mb-3">
            <input type="text" class="form-control" name="nombre" [(ngModel)]="nuevoUsuario.nombre" placeholder="Nombre completo" required>
            <label>Nombre Completo</label>
          </div>

          <div class="form-floating mb-3">
            <input type="email" class="form-control" name="correo" [(ngModel)]="nuevoUsuario.correo" placeholder="Correo" required>
            <label>Correo Electrónico</label>
          </div>

          <div class="form-floating mb-4">
            <input type="password" class="form-control" name="password" [(ngModel)]="nuevoUsuario.password" placeholder="Contraseña" required>
            <label>Contraseña</label>
          </div>

          <button type="button" class="btn btn-login w-100 py-3 fw-bold mb-3" [disabled]="registroForm.invalid" (click)="onRegistro()">
            CREAR CUENTA
          </button>

          <div class="text-center">
            <a routerLink="/login" class="small fw-bold text-decoration-none" style="color: #A3AD85;">Ya tengo cuenta, iniciar sesión</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
