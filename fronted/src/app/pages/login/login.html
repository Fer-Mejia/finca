<div class="login-wrapper">
  <div class="background-image-overlay"></div>

  <div class="login-container d-flex align-items-center justify-content-center p-3">
    <div class="card login-card shadow-2-strong border-0">
      <div class="card-body p-5">
        
        <div class="text-center mb-5">
          <div class="icon-box mb-3 mx-auto">
            <i class="bi bi-cup-hot-fill fs-1" style="color: #F8F5F2;"></i>
          </div>
          <h1 class="fw-bold h2 mb-2" style="color: #3D2B1F; font-family: 'Playfair Display', serif;">
            Experiencia La Finca
          </h1>
          <p class="text-muted small">Descubre el sabor auténtico del café hidrocálido</p>
        </div>

        <form #loginForm="ngForm">
          <div class="form-floating mb-3">
            <input type="email" class="form-control" id="correo" name="correo"
                   placeholder="nombre@ejemplo.com" [(ngModel)]="credenciales.correo" required>
            <label for="correo">Correo Electrónico</label>
          </div>

          <div class="form-floating mb-4">
            <input type="password" class="form-control" id="password" name="password"
                   placeholder="Contraseña" [(ngModel)]="credenciales.password" required>
            <label for="password">Contraseña</label>
          </div>

          <button type="button" class="btn btn-login w-100 py-3 fw-bold mb-4 shadow-sm" 
                  [disabled]="loginForm.invalid" (click)="onLogin()">
            INICIAR SESIÓN
          </button>

          <div class="text-center">
            <span class="small text-muted">¿Aún no tienes cuenta? </span>
            <a routerLink="/registro" class="small fw-bold text-decoration-none" style="color: #A3AD85;">Regístrate</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
